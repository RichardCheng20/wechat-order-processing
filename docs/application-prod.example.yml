# 生产配置模板：复制到服务器 /opt/vwholesale/application-prod.yml
# 勿提交含真实 AppSecret 的文件到 Git

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/vwholesale?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: vwholesale
    password: <强密码>
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: vwholesale
    password: <强密码>
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  mq:
    enabled: true
  wechat:
    app-id: wxd056da1506f00ca1
    app-secret: <在微信公众平台重置后填写，勿提交 Git>
  upload:
    dir: /opt/vwholesale/uploads

logging:
  level:
    com.vwholesale: info
