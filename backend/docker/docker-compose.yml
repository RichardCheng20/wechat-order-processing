services:
  mysql:
    image: mysql:8.0
    container_name: vwholesale-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vwholesale
      MYSQL_USER: vwholesale
      MYSQL_PASSWORD: vwholesale
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: vwholesale-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vwholesale-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: vwholesale
      RABBITMQ_DEFAULT_PASS: vwholesale
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
