# 本地私密配置（勿提交 Git）
#
# 用法：
#   复制此文件为 application-dev-local.yml（同目录，已在 .gitignore）
#   填入真实 AppSecret 与 openid 白名单
#   app-id 须与 frontend/src/manifest.json 中 mp-weixin.appid 一致
#
# 修改后需重启后端：cd backend && mvn spring-boot:run

app:
  wechat:
    app-id: wxd056da1506f00ca1
    app-secret: 在此填入小程序 AppSecret
    # 未发正式版、仅开发者工具/体验版联调时改为 develop
    env-version: develop
  admin:
    openid-whitelist:
      - 在此填入你的 openid
